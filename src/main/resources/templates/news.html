<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Latest Stock News</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 20px; }
        h1 { text-align: center; margin-bottom: 30px; color: #333; }
        .news-card { background-color: #fff; padding: 20px; margin-bottom: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .news-title { font-size: 20px; font-weight: bold; color: #222; }
        .news-description { margin: 10px 0; color: #555; }
        .news-link { color: #007bff; text-decoration: none; }
        .news-link:hover { text-decoration: underline; }
        .news-image { max-width: 100%; border-radius: 8px; margin-top: 10px; }
        .published-at { color: #999; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>Latest Stock News</h1>
    <div th:each="news : ${newsList}" class="news-card">
        <div class="news-title" th:text="${news['title']}"></div>
        <div class="news-description" th:text="${news['description']}"></div>
        <a class="news-link" th:href="${news['url']}" target="_blank">Read more</a>
        <div th:if="${news['image_url']}">
            <img th:src="${news['image_url']}" class="news-image"/>
        </div>
        <div class="published-at" th:text="${news['published_at']}"></div>
    </div>
</body>
</html>
